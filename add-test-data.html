<!DOCTYPE html>
<html>
<head>
    <title>Add Test Data</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; background: #0d1117; color: #c9d1d9; }
        button { background: #238636; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
        .success { background: rgba(46, 160, 67, 0.15); border: 1px solid #2ea043; color: #3fb950; }
        .error { background: rgba(248, 81, 73, 0.15); border: 1px solid #f85149; color: #ff7b72; }
    </style>
</head>
<body>
    <h1>🔧 Add Test Data to Google Sheets</h1>
    <p>This will add sample workers and data to your Google Sheets.</p>
    <button onclick="addTestData()">Add Test Data</button>
    <div id="result"></div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw2VHbUkcGK3PWTuS-vdjTKl2vj_rrDXP7tVxY0xWsPXE-YTB6XehgyxcdDPLMjIqo4/exec";

        async function addTestData() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result">Adding test data...</div>';

            const testData = {
                workers: [
                    { id: 'w1', name: 'Rajesh Kumar', empId: 'EMP001', type: 'daily', unit: 'unit1', emoji: '👷', category: 'piece_work', salary: 0, otRate: 50, dailyWage: 0, paidLeaves: 0 },
                    { id: 'w2', name: 'Priya Sharma', empId: 'EMP002', type: 'permanent', unit: 'unit2', emoji: '👩‍🏭', category: 'monthly_salary', salary: 15000, otRate: 100, dailyWage: 0, paidLeaves: 2 },
                    { id: 'w3', name: 'Amit Patel', empId: 'EMP003', type: 'packing', unit: 'unit3', emoji: '🧑‍🏭', category: 'bundle_packing', salary: 0, otRate: 75, flatAmount: 500, dailyWage: 0, paidLeaves: 0 }
                ],
                unit1Entries: [
                    { id: 'e1', workerId: 'w1', date: '2026-05-31', assigned: 100, output: 95, rate: 5, wage: 475, mAssigned: 50, aAssigned: 50, notCompleted: 5, workDesc: '' }
                ],
                unit2Entries: [
                    { id: 'e2', workerId: 'w2', date: '2026-05-31', assigned: 0, output: 0, rate: 0, wage: 0, mAssigned: 0, aAssigned: 0, notCompleted: 0, workDesc: '' }
                ],
                unit3Entries: [
                    { id: 'e3', workerId: 'w3', date: '2026-05-31', assigned: 100, output: 100, rate: 5, wage: 500, mAssigned: 100, aAssigned: 0, notCompleted: 0, workDesc: '' }
                ],
                unit4Entries: [],
                unit1Attendance: [
                    { workerId: 'w1', date: '2026-05-31', status: 'present', otAmount: 100, otHours: 2, advance: 50 }
                ],
                unit2Attendance: [
                    { workerId: 'w2', date: '2026-05-31', status: 'present', otAmount: 200, otHours: 2, advance: 0 }
                ],
                unit3Attendance: [
                    { workerId: 'w3', date: '2026-05-31', status: 'present', otAmount: 0, otHours: 0, advance: 100 }
                ],
                unit4Attendance: [],
                maintenance: [],
                users: [
                    { username: 'admin', password: 'admin123', gmail: 'admin@gmail.com', role: 'admin', access: {} }
                ]
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'sync_all',
                        data: testData
                    })
                });

                const result = await response.json();

                if (result.success) {
                    resultDiv.innerHTML = `<div class="result success">✅ SUCCESS!\n\nTest data added:\n- 3 Workers (Rajesh, Priya, Amit)\n- 3 Entries (one per unit)\n- 3 Attendance records\n- 1 Admin user\n\nYou can now login to your app with:\nUsername: admin\nPassword: admin123</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ FAILED\n\n${result.message}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="result error">❌ ERROR\n\n${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
